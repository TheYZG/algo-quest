<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语义搜索 — 算法大陆</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES & RESET — 100% copy of quest-mode :root + body
   ============================================================ */
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --card: #f4f1eb;
  --border: #e8e4dc;
  --border-light: #d8d4cc;
  --text: #1a1c2e;
  --text-dim: #5a5d6e;
  --input-bg: #faf8f5;
  --green: #4ecdc4;
  --amber: #d4a017;
  --red: #ff6b6b;
  --accent: #ff6b6b;
  --accent-hover: #e85d5d;
  --code-bg: #f0ede8;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Space Grotesk', system-ui, sans-serif;
  --font-code: 'Space Mono', 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px; line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(210,200,180,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(200,190,170,0.08) 0%, transparent 50%);
  background-attachment: fixed;
}

::selection { background: var(--accent); color: #fff; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ============================================================
   QUEST-MODE COMPONENT CLONES
   ============================================================ */

/* app-container */
.app-container { max-width: 900px; margin: 0 auto; padding: 24px 20px 40px; }

/* HUD-bar clone → top-bar */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; margin-bottom: 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}

/* tavern-btn clone → back-btn & all compact buttons */
.back-btn, .filter-btn {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  padding: 6px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s var(--ease);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.back-btn { border-color: var(--amber); color: var(--amber); }
.back-btn:hover { background: rgba(212,160,23,.1); box-shadow: var(--shadow-sm); }
.filter-btn:hover { color: var(--text); border-color: var(--border-light); box-shadow: var(--shadow-sm); }
.filter-btn.active {
  color: #fff; border-color: var(--accent); background: var(--accent);
  box-shadow: var(--shadow);
}

/* conn-pill */
.conn-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-size: 12px; color: var(--text-dim);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.online { background: var(--green); box-shadow: 0 0 6px rgba(78,205,196,.4); }
.status-dot.offline { background: var(--red); }

/* screen-title (exact copy) */
.screen-title {
  text-align: center; margin-bottom: 8px;
  font-family: var(--font-heading); font-size: 25px; font-weight: 900;
  color: var(--text); letter-spacing: -0.02em; line-height: 1.2;
}
.subtitle {
  display: block;
  font-family: var(--font-body); font-size: 12px; font-weight: 400;
  color: var(--text-dim); letter-spacing: 0.05em; margin-top: 4px;
}

/* Search pane — battlestyle box */
.search-pane {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px; margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
}
.search-row { display: flex; gap: 10px; }
.search-input {
  flex: 1;
  padding: 12px 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px; font-family: var(--font-body); outline: none;
  transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,107,0.12);
}
.search-input::placeholder { color: var(--text-dim); font-size: 13px; }

/* pixel-btn clone */
.pixel-btn {
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  padding: 12px 28px;
  border: 2px solid var(--accent); border-radius: var(--radius);
  cursor: pointer; white-space: nowrap;
  color: #fff; background: var(--accent);
  transition: all 0.3s var(--ease);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.pixel-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255,107,107,0.2);
}
.pixel-btn:active { transform: translateY(0); }
.pixel-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Quick tags — mode-tab clone */
.quick-tags {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;
}
.quick-tag {
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s var(--ease);
}
.quick-tag:hover { color: var(--text); border-color: var(--accent); box-shadow: var(--shadow-sm); }

/* Filters */
.filters {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.filter-label {
  font-size: 11px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
  margin-right: 4px;
}

/* Search meta */
.search-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.search-meta .query-text { color: var(--accent); font-weight: 600; }
.search-meta .count { color: var(--text-dim); }

/* Result cards — kingdom-card clone (glass morphism) */
.result-card {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius);
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.35s var(--ease);
  position: relative; overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.result-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  background: var(--border); opacity: 0.6;
  transition: all 0.3s var(--ease);
}
.result-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,.14);
  box-shadow: 0 12px 40px rgba(0,0,0,.2), 0 0 0 1px rgba(255,255,255,.04) inset;
}
.result-card:hover::before { background: var(--accent); opacity: 1; }
.result-card > * { position: relative; z-index: 1; }

.result-number {
  min-width: 48px; text-align: right;
  font-size: 11px; color: var(--text-dim);
  font-family: var(--font-code); padding-top: 3px;
}
.result-content { flex: 1; }
.result-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 3px;
}
.result-id { font-size: 12px; color: var(--text-dim); }
.result-tags {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
}
.tag {
  padding: 2px 10px;
  background: rgba(255,107,107,0.08);
  border: 1px solid rgba(255,107,107,0.2);
  border-radius: 12px;
  font-size: 10px; color: var(--accent-hover);
  font-family: var(--font-code);
}
.diff-badge {
  padding: 2px 10px; border-radius: 12px;
  font-size: 10px; font-weight: 700;
  font-family: var(--font-code);
}

/* Empty / Loading / Error — same language */
.empty {
  text-align: center; padding: 48px 20px; color: var(--text-dim);
}
.empty .icon { font-size: 44px; opacity: 0.25; margin-bottom: 12px; }
.empty h3 {
  font-family: var(--font-heading); font-size: 18px;
  color: var(--text-dim); margin-bottom: 6px;
}
.empty p { font-size: 13px; }

.loading { text-align: center; padding: 36px; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: var(--text-dim); }

.error-msg {
  text-align: center; padding: 24px; font-size: 13px;
  color: var(--red);
  background: var(--surface); border: 1px solid rgba(255,107,107,.15);
  border-radius: var(--radius);
}
.error-msg small { display: block; margin-top: 6px; color: var(--text-dim); }

/* Responsive */
@media (max-width: 640px) {
  .app-container { padding: 16px 12px 30px; }
  .screen-title { font-size: 22px; }
  .search-row { flex-direction: column; }
  .pixel-btn { text-align: center; }
  .result-card { gap: 10px; padding: 14px; }
  .result-number { min-width: 36px; }
}
</style>
</head>
<body>

<div class="app-container">

  <!-- TOP BAR (HUD clone) -->
  <div class="top-bar">
    <a class="back-btn" href="/static/quest-mode.html">&#9876;&#65039; &#36820;&#22238;&#21047;&#39064;</a>
    <div class="conn-pill" id="connStatus">
      <span class="status-dot offline" id="statusDot"></span>
      <span id="statusText">&#26816;&#27979;&#20013;...</span>
    </div>
  </div>

  <!-- TITLE (screen-title clone) -->
  <h1 class="screen-title">AI &#35821;&#20041;&#25628;&#32034;<span class="subtitle">&#8212; Semantic Search &#8212;</span></h1>

  <!-- SEARCH PANE -->
  <div class="search-pane">
    <div class="search-row">
      <input
        type="text" class="search-input" id="searchInput"
        placeholder='&#35797;&#35797;&#25628;&#32034;: "&#36866;&#21512;&#21021;&#23398;&#32773;&#30340;&#21160;&#24577;&#35268;&#21010;&#20837;&#38376;&#39064;" &#25110; "&#31867;&#20284;&#36339;&#36291;&#28216;&#25103;&#30340;&#36138;&#24515;&#39064;&#30446;"...'
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="pixel-btn" id="searchBtn" onclick="doSearch()">&#128269; &#25628;&#32034;</button>
    </div>
    <div class="quick-tags">
      <span class="quick-tag" onclick="quickSearch('&#20837;&#38376;&#32423;&#30340;&#20108;&#20998;&#26597;&#25214;&#32451;&#20064;&#39064;')">&#128312; &#20837;&#38376;&#20108;&#20998;&#26597;&#25214;</span>
      <span class="quick-tag" onclick="quickSearch('&#20160;&#20040;&#26159;&#21160;&#24577;&#35268;&#21010;&#65292;&#26377;&#21738;&#20123;&#32463;&#20856;&#39064;&#30446;')">&#128214; &#21160;&#24577;&#35268;&#21010;&#20837;&#38376;</span>
      <span class="quick-tag" onclick="quickSearch('&#38656;&#35201;&#29992;&#21040;&#21704;&#24076;&#34920;&#21644;&#21452;&#25351;&#38024;&#30340;&#39064;&#30446;')">&#128451;&#65039; &#21704;&#24076;+&#21452;&#25351;&#38024;</span>
      <span class="quick-tag" onclick="quickSearch('&#21644;&#22270;&#36941;&#21382;&#12289;&#26368;&#30701;&#36335;&#24452;&#30456;&#20851;&#30340;&#22256;&#38590;&#39064;')">&#128506;&#65039; &#22270;&#35770;&#22256;&#38590;&#39064;</span>
      <span class="quick-tag" onclick="quickSearch('&#38142;&#34920;&#21453;&#36716;&#12289;&#21512;&#24182;&#30456;&#20851;&#30340;&#38754;&#35797;&#39640;&#39057;&#39064;')">&#128279; &#38142;&#34920;&#39640;&#39057;&#39064;</span>
      <span class="quick-tag" onclick="quickSearch('&#36866;&#21512;&#21021;&#23398;&#32773;&#30340;&#27169;&#25311;&#39064;&#21644;&#26292;&#21147;&#35299;&#27861;')">&#127918; &#26032;&#25163;&#27169;&#25311;&#39064;</span>
    </div>
  </div>

  <!-- FILTERS (tavern-btn clone) -->
  <div class="filters">
    <span class="filter-label">&#38590;&#24230;</span>
    <button class="filter-btn active" data-diff="all" onclick="setDifficulty(null)">&#20840;&#37096;</button>
    <button class="filter-btn" data-diff="Easy" onclick="setDifficulty('Easy')">&#31616;&#21333;</button>
    <button class="filter-btn" data-diff="Medium" onclick="setDifficulty('Medium')">&#20013;&#31561;</button>
    <button class="filter-btn" data-diff="Hard" onclick="setDifficulty('Hard')">&#22256;&#38590;</button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="empty">
      <div class="icon">&#128302;</div>
      <h3>&#36755;&#20837;&#20320;&#24819;&#25214;&#30340;&#39064;&#30446;&#25551;&#36848;</h3>
      <p>&#19981;&#29992;&#35760;&#39064;&#21495;&#65292;&#29992;&#33258;&#28982;&#35821;&#35328;&#25551;&#36848;&#23601;&#22909;</p>
    </div>
  </div>

</div>

<script>
// Apply dark theme CSS variables (exact copy of quest-mode THEMES.dark + applyTheme)
(function() {
  var dark = {
    '--bg': '#0a0e17', '--surface': '#111827', '--card': '#151d2b',
    '--border': '#2a3f5f', '--text': '#dde4f0', '--input-bg': '#0d1117',
    '--code-bg': '#0d1420', '--text-dim': '#6a7b95',
  };
  var root = document.documentElement;
  for (var prop in dark) { root.style.setProperty(prop, dark[prop]); }
})();

// Connection check
async function checkConnection() {
    try {
        var res = await fetch('http://localhost:8000/api/health');
        if (res.ok) {
            document.getElementById('statusDot').className = 'status-dot online';
            document.getElementById('statusText').textContent = '已连接';
            return true;
        }
    } catch (e) {}
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = '后端未启动';
    return false;
}

var currentDifficulty = null;

function setDifficulty(diff) {
    currentDifficulty = diff;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    var active = document.querySelector('[data-diff="' + (diff || 'all') + '"]');
    if (active) active.classList.add('active');
}

async function quickSearch(q) {
    document.getElementById('searchInput').value = q;
    await doSearch();
}

async function doSearch() {
    var query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    var resultsDiv = document.getElementById('results');
    var btn = document.getElementById('searchBtn');

    btn.disabled = true;
    btn.textContent = '搜索中...';
    resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>AI 正在理解你的搜索意图...</p></div>';

    try {
        var res = await fetch('http://localhost:8000/api/problems/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                query: query,
                top_k: 15,
                difficulty: currentDifficulty || undefined,
            }),
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);

        var data = await res.json();
        renderResults(query, data);
    } catch (e) {
        resultsDiv.innerHTML = '<div class="error-msg">搜索失败: ' + e.message + '<br><small>请确保后端已启动并已导入数据</small></div>';
    } finally {
        btn.disabled = false;
        btn.textContent = '🔍 搜索';
    }
}

function renderResults(query, data) {
    var resultsDiv = document.getElementById('results');

    if (!data.results || data.results.length === 0) {
        resultsDiv.innerHTML = '<div class="empty"><div class="icon">&#128270;</div><h3>没有找到匹配的题目</h3><p>试试换个描述方式？</p></div>';
        return;
    }

    var html = '<div class="search-meta"><span>搜索: <span class="query-text">"' + escapeHtml(query) + '"</span></span><span class="count">' + data.total + ' 个结果</span></div>';

    for (var i = 0; i < data.results.length; i++) {
        var r = data.results[i];
        var p = r.problem;
        var relPercent = Math.round(r.relevance * 100);

        var diffEmoji = p.difficulty === 'Easy' ? '&#128036;' : p.difficulty === 'Medium' ? '&#128058;' : '&#128009;';
        var diffStyle = p.difficulty === 'Easy' ? 'background:rgba(78,205,196,.12);color:var(--green);' : p.difficulty === 'Medium' ? 'background:rgba(212,160,23,.12);color:var(--amber);' : 'background:rgba(255,107,107,.12);color:var(--red);';

        var tagsHtml = '';
        if (p.tags && p.tags.length > 0) {
            for (var j = 0; j < Math.min(p.tags.length, 5); j++) {
                tagsHtml += '<span class="tag">' + escapeHtml(p.tags[j]) + '</span>';
            }
        }

        var title = p.title_cn || p.title || ('Problem #' + p.number);
        var titleEn = p.title_cn ? (p.title || '') : '';

        html += '<div class="result-card" onclick="viewProblem(\'' + escapeHtml(String(p.number || p.id)) + '\')">'
             + '<div class="result-number">#' + (p.number || p.id) + '<br><span style="font-size:10px;color:var(--accent-hover)">' + relPercent + '%</span></div>'
             + '<div class="result-content">'
             + '<div class="result-title">' + escapeHtml(title) + (titleEn ? ' <span style="font-weight:400;color:var(--text-dim);font-size:13px;">(' + escapeHtml(titleEn) + ')</span>' : '') + '</div>'
             + '<div style="display:flex;align-items:center;gap:8px;">'
             + '<span class="diff-badge" style="' + diffStyle + '">' + diffEmoji + ' ' + (p.difficulty || 'Medium') + '</span>'
             + (p.kingdom ? '<span class="tag" style="border-color:rgba(255,107,107,.25);color:var(--accent);">&#127984; ' + escapeHtml(p.kingdom) + '</span>' : '')
             + '</div>'
             + (tagsHtml ? '<div class="result-tags">' + tagsHtml + '</div>' : '')
             + '</div></div>';
    }

    resultsDiv.innerHTML = html;
}

function viewProblem(id) {
    location.href = '/static/quest-mode.html?problem=' + encodeURIComponent(id);
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

checkConnection();
document.getElementById('searchInput').focus();
</script>
</body>
</html>

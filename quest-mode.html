<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算法大陆 - Algorithm Kingdoms</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  /* Theme-swappable tokens (JS theme system overrides these) */
  --bg: #faf8f5;
  --surface: #ffffff;
  --card: #f4f1eb;
  --border: #e8e4dc;
  --border-light: #d8d4cc;
  --text: #1a1c2e;
  --text-dim: #5a5d6e;
  --input-bg: #faf8f5;
  /* Semantic color tokens */
  --green: #4ecdc4;
  --cyan: #38bdf8;
  --amber: #d4a017;
  --pink: #f472b6;
  --purple: #a855f7;
  --red: #ff6b6b;
  --gold: #d4a017;
  --hp-green: #4ecdc4;
  --hp-yellow: #ffd93d;
  --hp-red: #ff6b6b;
  /* Magazine-specific tokens (NOT overridden by theme JS) */
  --accent: #ff6b6b;
  --accent-hover: #e85d5d;
  --code-bg: #f0ede8;
  --ink: rgba(26,28,46,0.05);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
  /* Typography */
  --font-heading: 'Playfair Display', Georgia, serif;
  --font-body: 'Space Grotesk', system-ui, sans-serif;
  --font-code: 'Space Mono', 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(210,200,180,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(200,190,170,0.08) 0%, transparent 50%);
  background-attachment: fixed;
}

::selection { background: var(--accent); color: #fff; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ============================================================
   KEYFRAMES
   ============================================================ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes defeatAnim { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.5); } 100% { opacity: 0; transform: scale(0); } }
@keyframes victoryGlow { 0% { box-shadow: 0 0 40px rgba(78,205,196,0.3); } 100% { box-shadow: none; } }
@keyframes rainbowGlow {
  0%   { box-shadow: 0 0 20px rgba(255,107,107,0.15), 0 0 40px rgba(255,107,107,0.05); }
  25%  { box-shadow: 0 0 20px rgba(168,85,247,0.15), 0 0 40px rgba(168,85,247,0.05); }
  50%  { box-shadow: 0 0 20px rgba(56,189,248,0.15), 0 0 40px rgba(56,189,248,0.05); }
  75%  { box-shadow: 0 0 20px rgba(78,205,196,0.15), 0 0 40px rgba(78,205,196,0.05); }
  100% { box-shadow: 0 0 20px rgba(255,107,107,0.15), 0 0 40px rgba(255,107,107,0.05); }
}
@keyframes chaosTextGlow {
  0%,100% { color: #ff6b6b; }
  16% { color: #a855f7; }
  33% { color: #38bdf8; }
  50% { color: #4ecdc4; }
  66% { color: #e9b644; }
  83% { color: #f472b6; }
}
@keyframes toastIn { 0% { opacity: 0; transform: translateX(-50%) translateY(-20px); } 100% { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { 0% { opacity: 1; } 100% { opacity: 0; } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
@keyframes stageUnlockFlash {
  0% { box-shadow: 0 0 20px rgba(212,160,23,0.3); border-color: var(--amber); }
  50% { box-shadow: 0 0 40px rgba(212,160,23,0.5); border-color: var(--amber); }
  100% { box-shadow: none; border-color: var(--border); }
}

/* ============================================================
   LAYOUT
   ============================================================ */
.app-container { max-width: 1200px; margin: 0 auto; padding: 24px 32px 40px; }
.screen { display: none; animation: fadeIn 0.35s var(--ease); }
.screen.active { display: block; }

/* ============================================================
   HUD
   ============================================================ */
.hud-bar {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 24px; margin-bottom: 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  flex-wrap: wrap; font-size: 13px;
}
.hud-stat { display: flex; align-items: center; gap: 6px; color: var(--text); }
.hud-stat .icon { font-size: 18px; }
.hud-stat .label { color: var(--text-dim); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.hud-stat .value { color: var(--accent); font-size: 13px; font-weight: 600; }
.hud-divider { width: 1px; height: 24px; background: var(--border); }
.hp-bar-outer { width: 80px; height: 10px; background: var(--code-bg); border-radius: 5px; position: relative; overflow: hidden; }
.hp-bar-inner { height: 100%; width: 100%; background: var(--hp-green); border-radius: 5px; transition: width 0.5s ease; }
.hud-mode { margin-left: auto; font-size: 12px; color: var(--accent); padding: 4px 14px; border: 1px solid var(--accent); border-radius: 20px; font-weight: 500; }

/* ============================================================
   MODE TABS
   ============================================================ */
.mode-tabs {
  display: flex; gap: 8px; margin-bottom: 24px;
  justify-content: center;
}
.mode-tab {
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  padding: 10px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-dim); cursor: pointer;
  transition: all 0.2s var(--ease);
  letter-spacing: 0.02em;
}
.mode-tab:hover { color: var(--text); border-color: var(--border-light); box-shadow: var(--shadow-sm); }
.mode-tab.active {
  color: #fff;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: var(--shadow);
}

/* ============================================================
   TITLE
   ============================================================ */
.screen-title {
  text-align: center; margin-bottom: 32px;
  font-family: var(--font-heading); font-size: 28px; font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.subtitle {
  display: block;
  font-family: var(--font-body);
  font-size: 13px; font-weight: 400;
  color: var(--text-dim);
  margin-top: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ============================================================
   KINGDOM GRID
   ============================================================ */
.kingdom-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-bottom: 30px;
}
.kingdom-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer;
  transition: all 0.3s var(--ease);
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.kingdom-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--border-light);
  border-radius: 4px 0 0 4px;
  transition: width 0.3s var(--ease), background 0.3s var(--ease);
}
.kingdom-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-light);
}
.kingdom-card > * { position: relative; z-index: 1; }
.kingdom-card.chaos {
  animation: rainbowGlow 4s linear infinite;
}
.kingdom-card.chaos::before { background: transparent; }
.kingdom-card.chaos .kingdom-name {
  animation: chaosTextGlow 4s linear infinite;
}
.kingdom-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.kingdom-emoji { font-size: 28px; }
.kingdom-name { font-family: var(--font-heading); font-size: 16px; font-weight: 700; line-height: 1.4; }
.kingdom-stats { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.progress-bar-outer {
  height: 8px; background: var(--code-bg);
  border-radius: 4px; margin-bottom: 8px;
  position: relative; overflow: hidden;
}
.progress-bar-inner {
  height: 100%; background: var(--accent); border-radius: 4px;
  transition: width 0.5s ease;
}
.difficulty-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.diff-pill {
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  padding: 3px 10px; border: 1px solid; border-radius: 20px;
  background: transparent; letter-spacing: 0.03em;
}
.diff-pill.easy { color: var(--green); border-color: var(--green); }
.diff-pill.medium { color: var(--amber); border-color: var(--amber); }
.diff-pill.hard { color: var(--red); border-color: var(--red); }

/* ============================================================
   ADVENTURE PATH (Mode 2)
   ============================================================ */
.adventure-progress {
  text-align: center; margin-bottom: 24px;
  font-size: 14px; color: var(--text); padding: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.adventure-progress .stage-count { color: var(--accent); font-size: 12px; font-weight: 600; }

.adventure-path {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; max-height: 65vh; overflow-y: auto;
  padding: 20px 40px;
}

.adventure-stage-wrapper {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; max-width: 700px;
}

.adventure-connector {
  width: 2px; height: 28px;
  background: var(--border); position: relative;
}
.adventure-connector.unlocked { background: var(--green); }
.adventure-connector.locked { background: var(--border); opacity: 0.4; }

.adventure-stage {
  display: flex; align-items: center; gap: 16px;
  width: 100%; padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  transition: all 0.3s var(--ease);
  position: relative; overflow: hidden;
}
.adventure-stage::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 40px; height: 40px;
  border-radius: 0 0 0 40px;
  opacity: 0; transition: opacity 0.3s;
}
.adventure-stage.completed {
  background: linear-gradient(90deg, rgba(78,205,196,.08), var(--surface) 30%);
  border-color: rgba(78,205,196,.3);
}
.adventure-stage.completed::after { background: rgba(78,205,196,.1); opacity: 1; }
.adventure-stage.available {
  cursor: pointer;
  background: linear-gradient(90deg, rgba(212,160,23,.06), var(--surface) 20%);
  border-color: rgba(212,160,23,.2);
}
.adventure-stage.available:hover {
  transform: translateX(6px);
  background: linear-gradient(90deg, rgba(212,160,23,.12), var(--surface) 20%);
  border-color: rgba(212,160,23,.4);
  box-shadow: var(--shadow-md);
}
.adventure-stage.available.unlocking {
  animation: stageUnlockFlash 1.5s ease forwards;
}
.adventure-stage.locked { opacity: 0.4; cursor: not-allowed; background: var(--card); }
.adventure-stage .stage-number {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-heading); font-size: 20px; font-weight: 700;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); flex-shrink: 0; color: var(--text-dim);
}
.adventure-stage.completed .stage-number {
  border-color: var(--green); color: var(--green);
}
.adventure-stage .stage-info { flex: 1; }
.adventure-stage .stage-problem { font-family: var(--font-code); font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.adventure-stage .stage-title { font-family: var(--font-heading); font-size: 15px; font-weight: 600; }
.adventure-stage .stage-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.adventure-stage .kingdom-tag {
  font-family: var(--font-body); font-size: 10px; padding: 3px 8px;
  border: 1px solid var(--border); border-radius: 20px;
  color: var(--text-dim);
}
.adventure-stage .stage-enemy { font-size: 28px; flex-shrink: 0; transition: all 0.5s ease; }
.adventure-stage .stage-status { font-size: 24px; flex-shrink: 0; width: 40px; text-align: center; }

/* ============================================================
   PLAYLISTS (Mode 3)
   ============================================================ */
.playlist-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-bottom: 30px;
}
.playlist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer;
  transition: all 0.3s var(--ease);
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.playlist-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.playlist-card > * { position: relative; z-index: 1; }
.playlist-card.hot { border-color: var(--accent); border-left: 4px solid var(--accent); }
.playlist-card.hot:hover { box-shadow: 0 4px 20px rgba(255,107,107,.15); }
.playlist-card.sword { border-left: 4px solid var(--purple); }
.playlist-card.sword:hover { box-shadow: 0 4px 20px rgba(168,85,247,.15); }
.playlist-card.diamond { border-left: 4px solid var(--cyan); }
.playlist-card.diamond:hover { box-shadow: 0 4px 20px rgba(56,189,248,.15); }
.playlist-card.dp { border-left: 4px solid var(--pink); }
.playlist-card.dp:hover { box-shadow: 0 4px 20px rgba(244,114,182,.15); }
.playlist-card.tree { border-left: 4px solid var(--green); }
.playlist-card.tree:hover { box-shadow: 0 4px 20px rgba(78,205,196,.15); }
.playlist-card.sql { border-left: 4px solid var(--amber); }
.playlist-card.sql:hover { box-shadow: 0 4px 20px rgba(212,160,23,.15); }
.playlist-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.playlist-emoji { font-size: 28px; }
.playlist-name { font-family: var(--font-heading); font-size: 16px; font-weight: 700; line-height: 1.4; }
.playlist-stats { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
.playlist-difficulty { display: flex; gap: 6px; flex-wrap: wrap; }

/* ============================================================
   PLAYLIST DETAIL SCREEN
   ============================================================ */
.playlist-detail-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
}
.playlist-detail-title { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--text); }
.playlist-problem-list {
  display: flex; flex-direction: column; gap: 8px;
  max-height: 60vh; overflow-y: auto;
}
.playlist-problem-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.playlist-problem-item:hover { transform: translateX(4px); border-color: var(--accent); box-shadow: var(--shadow); }
.playlist-problem-item.completed { background: rgba(78,205,196,.06); border-color: rgba(78,205,196,.3); }
.playlist-problem-item .problem-seq { font-family: var(--font-code); font-size: 13px; color: var(--text-dim); width: 30px; text-align: center; flex-shrink: 0; }
.playlist-problem-item .problem-name { font-size: 14px; font-weight: 500; flex: 1; }
.playlist-problem-item .problem-diff { flex-shrink: 0; }
.playlist-problem-item .problem-status { font-size: 20px; flex-shrink: 0; width: 30px; text-align: center; }

/* ============================================================
   TAVERN BUTTON
   ============================================================ */
.bottom-actions { text-align: center; margin-top: 24px; }
.tavern-btn {
  font-family: var(--font-body); font-size: 12px; font-weight: 500;
  padding: 10px 28px;
  background: var(--surface);
  border: 1px solid var(--amber);
  border-radius: 24px;
  color: var(--amber); cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.2s var(--ease);
}
.tavern-btn:hover { background: rgba(212,160,23,.08); box-shadow: 0 2px 12px rgba(212,160,23,.15); }
.tavern-btn:active { background: rgba(212,160,23,.15); }

/* ============================================================
   LEVEL PATH (Kingdom)
   ============================================================ */
.level-path-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
}
.back-btn {
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  padding: 8px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 24px;
  color: var(--text-dim); cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 0.2s var(--ease);
}
.back-btn:hover { border-color: var(--text); color: var(--text); }
.kingdom-title-large { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--text); }
.kingdom-title-large span { font-family: var(--font-body); font-size: 12px; font-weight: 400; color: var(--text-dim); }

.level-list {
  display: flex; flex-direction: column; gap: 12px;
  max-height: 60vh; overflow-y: auto; padding-right: 8px;
}
.level-card {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  transition: all 0.25s var(--ease);
  position: relative; overflow: hidden;
}
.level-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  transition: width 0.25s var(--ease);
}
.level-card.available { cursor: pointer; }
.level-card.available::before { background: var(--accent); }
.level-card.available:hover {
  transform: translateX(5px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-light);
}
.level-card.available:hover::before { width: 6px; }
.level-card.locked { background: var(--card); opacity: 0.55; }
.level-card.locked::before { background: var(--border); }
.level-card.completed {
  background: rgba(78,205,196,.04);
  border-color: rgba(78,205,196,.25);
  opacity: 0.85;
}
.level-card.completed::before { background: var(--green); }

.level-stage {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-heading); font-size: 13px; font-weight: 700;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); flex-shrink: 0; color: var(--text-dim);
  line-height: 1.3; text-align: center;
}
.level-card.completed .level-stage {
  border-color: var(--green); color: var(--green);
}
.level-info { flex: 1; }
.level-num { font-family: var(--font-code); font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.level-title { font-family: var(--font-heading); font-size: 15px; font-weight: 600; }
.level-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.diff-badge {
  font-family: var(--font-body); font-size: 10px; font-weight: 500;
  padding: 3px 10px; border: 1px solid; border-radius: 20px;
  letter-spacing: 0.03em;
}
.diff-badge.easy { color: var(--green); border-color: var(--green); }
.diff-badge.medium { color: var(--amber); border-color: var(--amber); }
.diff-badge.hard { color: var(--red); border-color: var(--red); }
.level-enemy { font-size: 28px; flex-shrink: 0; transition: all 0.5s ease; }
.level-enemy.defeated { animation: defeatAnim 0.5s forwards; }
.level-status { font-size: 24px; flex-shrink: 0; width: 40px; text-align: center; }

/* ============================================================
   BATTLE ARENA
   ============================================================ */
.enemy-bar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; margin-bottom: 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.enemy-sprite {
  font-size: 36px; transition: all 0.6s ease;
}
.enemy-sprite.defeated {
  animation: defeatAnim 0.6s forwards;
}
.enemy-info { flex: 1; }
.enemy-name { font-family: var(--font-heading); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.enemy-hp-outer {
  width: 100%; height: 10px; background: var(--code-bg);
  border-radius: 5px; overflow: hidden;
}
.enemy-hp-inner {
  height: 100%; width: 100%; background: var(--hp-green);
  border-radius: 5px; transition: width 0.6s ease-out;
}
.enemy-hp-text { font-family: var(--font-code); font-size: 10px; color: var(--text-dim); margin-top: 3px; text-align: right; }

.battle-panes {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 18px; margin-bottom: 18px;
  min-height: 400px;
}
.pane {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; overflow: hidden;
}
.pane-header {
  font-family: var(--font-heading); font-size: 14px; font-weight: 700;
  padding: 12px 16px;

/* Code Editor */

/* ============================================================
   TAVERN MODAL
   ============================================================ */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;

}
.modal-overlay.show { display: flex; }
.tavern-modal {

}

.tavern-item .kingdom-tag { font-size: 11px; color: var(--text-dim); }
.tavern-empty { text-align: center; color: var(--text-dim); font-size: 14px; padding: 30px; font-style: italic; }

/* ============================================================
   TOAST
   ============================================================ */
.toast-container { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 20000; pointer-events: none; }

.test-cases-panel {

.solution-code {

  color: var(--text);
  overflow-x: auto; white-space: pre;
  max-height: 300px; overflow-y: auto;
}
.solution-code.show { display: block; }

/* Solution Language Selector */
.solution-content { margin-top: 8px; display: none; }
.solution-content.show { display: block; }
.solution-lang-selector {
  display: flex; gap: 6px; margin-bottom: 8px;

}
.solution-lang-btn {
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  padding: 4px 12px; background: transparent;
  border: 1px solid var(--border); border-radius: 20px;
  color: var(--text-dim); cursor: pointer;
  transition: all 0.15s var(--ease);
}
.solution-lang-btn:hover { border-color: var(--purple); color: var(--purple); }
.solution-lang-btn.active { border-color: var(--purple); color: #fff; background: var(--purple); }

/* Theme Label */
.theme-label {
  position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
  z-index: 20001;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  padding: 8px 20px; border: 1px solid var(--border);
  border-radius: 24px;
  background: var(--surface); color: var(--text);
  box-shadow: var(--shadow-md);
  pointer-events: none;
  animation: slideDown 0.3s var(--ease) forwards;
  transition: opacity 0.3s ease;
  letter-spacing: 0.03em;
}

/* Theme Transitions */
body,
.hud-bar,
.mode-tab,
.kingdom-card,
.pane,
.pane-header,
.code-editor-wrapper,
.code-textarea,
.line-numbers,
.console-panel,
.console-content,
.test-cases-panel,
.level-card,
.level-stage,
.playlist-card,
.adventure-stage,
.adventure-stage .stage-number,
.editor-toolbar,
.enemy-bar,
.modal-overlay,
.tavern-modal,
.tavern-item,
.back-btn,
.tavern-btn,
.battle-actions .pixel-btn,
.solution-code,
.solution-section,
.hp-bar-outer,
.progress-bar-outer,
.lang-select,
.tab-btn,
.diff-pill,
.diff-badge,
.playlist-problem-item {
  transition: background 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
}

/* Theme-specific overrides for Light theme text contrast */
body.light-theme .code-textarea { color: #1a1a2e; }
body.light-theme .code-textarea::placeholder { color: #888; }
body.light-theme .console-content { color: #444; }
body.light-theme .solution-code { color: #1a1a2e; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .kingdom-grid { grid-template-columns: repeat(2, 1fr); }
  .playlist-grid { grid-template-columns: repeat(2, 1fr); }

  .hud-bar { gap: 10px; font-size: 11px; }

}

  .mode-tab { font-size: 11px; padding: 8px 14px; }

  .app-container { padding: 16px 14px 30px; }
}

<body>

<!-- ============================================================
     TOAST CONTAINER
     ============================================================ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ============================================================

};

const THEME_ORDER = ['dark', 'light', 'ocean', 'forest', 'purple', 'sunset'];

function getCurrentTheme() {
  try {
    const stored = localStorage.getItem('theme');
    if (stored && THEMES[stored]) return stored;
  } catch (e) {}
  return 'dark';
}

function applyTheme(themeKey) {
  const theme = THEMES[themeKey];
  const root = document.documentElement;
  for (const [prop, value] of Object.entries(theme)) {
    root.style.setProperty(prop, value);
  }

  // Toggle light-theme class for body
  if (themeKey === 'light') {
    document.body.classList.add('light-theme');
  } else {
    document.body.classList.remove('light-theme');
  }

  try { localStorage.setItem('theme', themeKey); } catch (e) {}
}

function cycleTheme() {
  const current = getCurrentTheme();
  const currentIdx = THEME_ORDER.indexOf(current);
  const nextIdx = (currentIdx + 1) % THEME_ORDER.length;
  const nextTheme = THEME_ORDER[nextIdx];
  applyTheme(nextTheme);
  showThemeLabel(THEME_NAMES[nextTheme]);
}

function showThemeLabel(name) {
  // Remove existing label
  const existing = document.querySelector('.theme-label');
  if (existing) existing.remove();

  const label = document.createElement('div');
  label.className = 'theme-label';
  label.textContent = '🎨 ' + name;
  document.body.appendChild(label);

  setTimeout(() => {
    label.style.opacity = '0';
    setTimeout(() => label.remove(), 300);
  }, 1500);
}

const STORAGE_KEY = 'algoKingdomQuestV2';

function saveState() {
  try {
    const data = {
      solvedProblems: state.solvedProblems,
      adventureStage: state.adventureStage,
      currentMode: state.currentMode,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
}

function loadState() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (Array.isArray(parsed.solvedProblems)) {
        state.solvedProblems = parsed.solvedProblems;
      }
      if (typeof parsed.adventureStage === 'number') {
        state.adventureStage = parsed.adventureStage;
      }
      if (parsed.currentMode) {
        state.currentMode = parsed.currentMode;
      }
    }
  } catch (e) {}
}

function getLV() {
  return Math.floor(state.solvedProblems.length / 5) + 1;
}

function getXP() {
  return state.solvedProblems.length * 150;
}

function getCoins() {
  return state.solvedProblems.length * 35;
}

function isProblemSolved(problemNumber) {
  return state.solvedProblems.includes(String(problemNumber));
}

function getReward(difficulty) {
  switch (difficulty) {
    case 'easy': return { xp: 50, coin: 10 };
    case 'medium': return { xp: 120, coin: 30 };
    case 'hard': return { xp: 250, coin: 60 };
    default: return { xp: 50, coin: 10 };
  }
}

function switchMode(mode) {
  state.currentMode = mode;
  saveState();

  // Update mode tabs
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[data-mode="${mode}"]`).classList.add('active');

  // Hide all mode screens
  ['screenKingdom', 'screenAdventure', 'screenTrials', 'screenLevels', 'screenPlaylistDetail', 'screenBattle']
    .forEach(id => document.getElementById(id).classList.remove('active'));

  // Show correct screen
  if (mode === 'free') {
    document.getElementById('screenKingdom').classList.add('active');
    renderKingdomSelect();
    showToast('mode', '🗺️ 切换至：自由探索', '');
    document.getElementById('hudMode').textContent = '自由探索';
  } else if (mode === 'adventure') {
    document.getElementById('screenAdventure').classList.add('active');
    renderAdventurePath();
    showToast('mode', '⚔️ 切换至：主线征程', '');
    document.getElementById('hudMode').textContent = '主线征程';
  } else if (mode === 'trials') {
    document.getElementById('screenTrials').classList.add('active');
    renderPlaylistGrid();
    showToast('mode', '🏆 切换至：秘境试炼', '');
    document.getElementById('hudMode').textContent = '秘境试炼';
  }

  state.currentKingdom = null;
  state.currentLevel = null;
  state.currentPlaylistId = null;
  updateHUD();
}

function enterBattle(problemNumber, sourceKingdomId) {
  // Use sourceKingdomId if provided, else try current state

  state.currentLanguage = 'python';

function flee() {
  if (state.currentMode === 'adventure') {
    switchToCurrentModeScreen();
  } else if (state.currentPlaylistId) {
    enterPlaylist(state.currentPlaylistId);
  } else if (state.currentKingdom) {
    enterKingdom(state.currentKingdom);
  } else {
    switchToCurrentModeScreen();
  }
}

function switchToCurrentModeScreen() {
  switch (state.currentMode) {
    case 'free': goToKingdomSelect(); break;
    case 'adventure': showScreen('screenAdventure'); renderAdventurePath(); break;
    case 'trials': goToTrials(); break;

  }

function renderLevelPath(kingdomId) {
  const kingdom = KINGDOMS.find(k => k.id === kingdomId);
  const levels = LEVEL_DATA[kingdomId];

  document.getElementById('levelKingdomTitle').innerHTML =
    `${kingdom.emoji} ${kingdom.name} <span>· STAGE SELECT</span>`;

  const list = document.getElementById('levelList');
  list.innerHTML = levels.map((lvl, idx) => {
    const solved = isProblemSolved(lvl.number);

    let statusClass, statusIcon, onclick;
    if (solved) {
      statusClass = 'completed';
      statusIcon = '✅';
      onclick = `enterBattle(${lvl.number}, '${kingdomId}')`;
    } else {
      statusClass = 'available';
      statusIcon = '⚔️';
      onclick = `enterBattle(${lvl.number}, '${kingdomId}')`;
    }

    return `
      <div class="level-card ${statusClass}" onclick="${onclick}">
        <div class="level-stage">STAGE<br>${idx + 1}</div>
        <div class="level-info">
          <div class="level-num">#${lvl.number}</div>
          <div class="level-title">${lvl.title}</div>
          <div class="level-meta">
            <span class="diff-badge ${lvl.difficulty}">${lvl.difficulty === 'easy' ? '简单' : lvl.difficulty === 'medium' ? '中等' : '困难'}</span>
          </div>
        </div>
        <span class="level-enemy">${lvl.enemy}</span>
        <span class="level-status">${statusIcon}</span>
      </div>
    `;
  }).join('');
}

  const maxStage = state.adventureStage;
  const totalStages = ADVENTURE_STAGES.length;
  const completedStages = ADVENTURE_STAGES.filter(s => isProblemSolved(s.number)).length;

  // Progress indicator
  document.getElementById('adventureProgress').innerHTML = `
    <span class="stage-count">Stage ${completedStages} / ${totalStages}</span>
    <div style="margin-top:6px;display:flex;align-items:center;gap:6px;justify-content:center;font-size:7px;color:var(--text-dim)">
      <span>已清除 ${completedStages}/${totalStages} 个关卡</span>
    </div>
  `;

  const path = document.getElementById('adventurePath');
  path.innerHTML = ADVENTURE_STAGES.map((stage, idx) => {
    const solved = isProblemSolved(stage.number);
    const stageNum = idx + 1;
    const isCurrent = stageNum === maxStage;
    const isLocked = stageNum > maxStage;

    let statusClass, statusIcon, onclick;
    if (solved) {
      statusClass = 'completed';
      statusIcon = '✅';
      onclick = `enterBattle(${stage.number}, '${stage.kingdom}')`;
    } else if (!isLocked) {
      statusClass = 'available';
      statusIcon = '⚔️';
      onclick = `enterBattle(${stage.number}, '${stage.kingdom}')`;
    } else {
      statusClass = 'locked';
      statusIcon = '🔒';
      onclick = '';
    }

    const kingdom = KINGDOMS.find(k => k.id === stage.kingdom);

    const connector = `<div class="adventure-connector${isLocked ? ' locked' : (solved ? ' unlocked' : '')}"></div>`;

    return `
      <div class="adventure-stage-wrapper">
        ${idx > 0 ? connector : ''}
        <div class="adventure-stage ${statusClass}" onclick="${onclick}" id="adventureStage${stageNum}">
          <div class="stage-number">${stageNum}</div>
          <div class="stage-info">
            <div class="stage-problem">#{${stage.number}}</div>
            <div class="stage-title">${isLocked ? '???' : stage.title}</div>
            <div class="stage-meta">
              <span class="diff-badge ${stage.difficulty}">${isLocked ? '???' : (stage.difficulty === 'easy' ? '简单' : stage.difficulty === 'medium' ? '中等' : '困难')}</span>
              ${isLocked ? '' : `<span class="kingdom-tag">${kingdom ? kingdom.emoji + ' ' + kingdom.name : ''}</span>`}
            </div>
          </div>
          <span class="stage-enemy">${isLocked ? '❓' : stage.enemy}</span>
          <span class="stage-status">${statusIcon}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// RENDER: PLAYLIST GRID
// ============================================================
function renderPlaylistGrid() {
  const grid = document.getElementById('playlistGrid');
  grid.innerHTML = PLAYLISTS.map(pl => {
    const solved = pl.problems.filter(p => isProblemSolved(p.number)).length;
    const total = pl.problems.length;
    const progressPercent = total > 0 ? (solved / total) * 100 : 0;

    return `
      <div class="playlist-card ${pl.cssClass}" onclick="enterPlaylist('${pl.id}')">
        <div class="playlist-header">
          <span class="playlist-emoji">${pl.emoji}</span>
          <span class="playlist-name">${pl.name}</span>
        </div>
        <div class="playlist-stats">📋 ${total} 题 | 🏆 ${solved}/${total} 完成</div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" style="width: ${progressPercent}%;${progressPercent === 100 ? 'background: #ffd700;' : ''}"></div>
        </div>
        <div class="difficulty-pills">
          <span class="diff-pill easy">简单 ${pl.easy}</span>
          <span class="diff-pill medium">中等 ${pl.medium}</span>
          <span class="diff-pill hard">困难 ${pl.hard}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// RENDER: PLAYLIST DETAIL
// ============================================================
function renderPlaylistDetail(playlistId) {
  const playlist = PLAYLISTS.find(p => p.id === playlistId);

  document.getElementById('playlistDetailTitle').innerHTML =
    `${playlist.emoji} ${playlist.name} <span style="font-size:8px;color:var(--text-dim)">· ${playlist.description}</span>`;

  const list = document.getElementById('playlistProblemList');
  list.innerHTML = playlist.problems.map(p => {
    const solved = isProblemSolved(p.number);
    const diffText = p.difficulty === 'easy' ? '简单' : p.difficulty === 'medium' ? '中等' : '困难';

    return `
      <div class="playlist-problem-item ${solved ? 'completed' : ''}" onclick="enterBattle(${p.number}, 'datastruct')">
        <span class="problem-seq">#${p.seq}</span>
        <span class="problem-name">${p.title}</span>
        <span class="problem-diff"><span class="diff-badge ${p.difficulty}">${diffText}</span></span>
        <span class="problem-status">${solved ? '✅' : '⚔️'}</span>
      </div>
    `;
  }).join('');
}

// ============================================================
// RENDER: BATTLE ARENA
// ============================================================
function renderBattleArena(problemNumber) {
  const num = String(problemNumber);
  const details = PROBLEM_DETAILS[num];

  let levelInfo = null;
  for (const [kid, levels] of Object.entries(LEVEL_DATA)) {
    const found = levels.find(l => l.number === parseInt(num));
    if (found) { levelInfo = found; break; }
  }

  const enemy = details ? details.enemy : (levelInfo ? levelInfo.enemy : '👾');
  const enemyName = details ? details.enemyName : (levelInfo ? 'UNKNOWN FOE' : 'MYSTERY CREATURE');
  const difficulty = details ? details.difficulty : (levelInfo ? levelInfo.difficulty : 'easy');

  document.getElementById('enemySprite').textContent = enemy;
  document.getElementById('enemySprite').classList.remove('defeated');
  document.getElementById('enemyName').textContent = enemyName + ' · ' + (difficulty === 'easy' ? '简单' : difficulty === 'medium' ? '中等' : '困难');
  document.getElementById('enemyHpBar').style.width = '100%';
  document.getElementById('enemyHpBar').style.background = 'var(--hp-green)';
  document.getElementById('enemyHpText').textContent = '100 / 100';

  const description = details
    ? details.description
    : getGenericDescription(num, levelInfo ? levelInfo.title : 'Unknown', difficulty);
  document.getElementById('questBriefing').innerHTML = description;

  document.getElementById('langSelect').value = state.currentLanguage;
  document.getElementById('codeEditor').value = getCodeTemplate(num, state.currentLanguage);
  updateLineNumbers();

  // Populate test cases
  populateTestCases(num, details);

  // Setup solution section
  setupSolutionSection(num, details);
}

// ============================================================
// TEST CASES POPULATION
// ============================================================
function populateTestCases(problemNumber, details) {
  const content = document.getElementById('testCasesContent');
  if (!content) return;

  const num = String(problemNumber);
  if (details && details.testCases && details.testCases.length > 0) {
    content.innerHTML = details.testCases.map((tc, i) => `
      <div class="test-case-item">
        <div class="tc-title">测试用例 ${i + 1}:</div>
        <div class="tc-line">输入: ${tc.input}</div>
        <div class="tc-line expected">期望输出: ${tc.expected}</div>
        ${tc.explanation ? '<div class="tc-line" style="color:#667788;">解释: ' + tc.explanation + '</div>' : ''}
      </div>
    `).join('');
  } else {
    content.innerHTML = '<div class="tc-line" style="color:var(--text-dim);font-family:var(--font-pixel);font-size:10px;">此题目暂无预设测试用例。请参考题目描述中的示例。</div>';
  }
}

// ============================================================
// SOLUTION TOGGLE
// ============================================================
let currentReference = null;

function setupSolutionSection(problemNumber, details) {
  const section = document.getElementById('solutionSection');
  const content = document.getElementById('solutionContent');
  const codeEl = document.getElementById('solutionCode');
  const langBtns = document.querySelectorAll('#solutionLangSelector .solution-lang-btn');
  if (!section || !codeEl) return;

  if (details && details.reference) {
    currentReference = details.reference;
    const hasSolutions = Object.keys(currentReference).length > 0;
    if (hasSolutions) {
      section.style.display = 'block';
      content.classList.remove('show');

      // Hide buttons for languages that don't have solutions
      langBtns.forEach(btn => {
        const lang = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
        if (currentReference[lang]) {
          btn.style.display = '';
          btn.classList.remove('active');
        } else {
          btn.style.display = 'none';
        }
      });

      // Default select first available language
      const firstLang = Object.keys(currentReference)[0];
      const firstBtn = document.querySelector(`#solutionLangSelector .solution-lang-btn[onclick*="${firstLang}"]`);
      if (firstBtn) firstBtn.classList.add('active');
      codeEl.textContent = currentReference[firstLang];
      codeEl.classList.remove('show');

      document.querySelector('.solution-toggle-btn').textContent = '💡 查看题解';
      document.querySelector('.solution-toggle-btn').disabled = false;
    } else {
      section.style.display = 'none';
    }
  } else {
    currentReference = null;
    section.style.display = 'none';
  }
}

function toggleSolution() {
  const codeEl = document.getElementById('solutionCode');
  const content = document.getElementById('solutionContent');
  const btn = document.querySelector('.solution-toggle-btn');
  if (!codeEl || !btn || !content) return;

  if (content.classList.contains('show')) {
    content.classList.remove('show');
    codeEl.classList.remove('show');
    btn.textContent = '💡 查看题解';
  } else {
    content.classList.add('show');
    codeEl.classList.add('show');
    btn.textContent = '💡 隐藏题解';
    // Ensure first available language is shown
    if (currentReference) {
      const firstLang = Object.keys(currentReference)[0];
      const firstBtn = document.querySelector(`#solutionLangSelector .solution-lang-btn[onclick*="${firstLang}"]`);
      if (firstBtn) {
        document.querySelectorAll('#solutionLangSelector .solution-lang-btn').forEach(b => b.classList.remove('active'));
        firstBtn.classList.add('active');
        codeEl.textContent = currentReference[firstLang];
      }
    }
  }
}

function switchSolutionLang(lang) {
  const codeEl = document.getElementById('solutionCode');
  if (!codeEl || !currentReference) return;

  // Update active button
  document.querySelectorAll('#solutionLangSelector .solution-lang-btn').forEach(b => b.classList.remove('active'));
  const targetBtn = document.querySelector(`#solutionLangSelector .solution-lang-btn[onclick*="${lang}"]`);
  if (targetBtn) targetBtn.classList.add('active');

  // Show corresponding code
  if (currentReference[lang]) {
    codeEl.textContent = currentReference[lang];
  }
}

// ============================================================
// LANGUAGE SWITCH
// ============================================================
function onLanguageChange() {
  state.currentLanguage = document.getElementById('langSelect').value;
  if (state.currentLevel) {
    document.getElementById('codeEditor').value = getCodeTemplate(state.currentLevel, state.currentLanguage);
    updateLineNumbers();
  }
}

// ============================================================
// LINE NUMBERS
// ============================================================
function updateLineNumbers() {
  const editor = document.getElementById('codeEditor');
  const lines = editor.value.split('\n').length;
  const nums = Array.from({length: Math.max(lines, 1)}, (_, i) => i + 1).join('\n');
  document.getElementById('lineNumbers').textContent = nums;
}

function syncScroll() {
  document.getElementById('lineNumbers').scrollTop = document.getElementById('codeEditor').scrollTop;
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  const codeWrapper = document.getElementById('codeEditorWrapper');
  const consolePanel = document.getElementById('consolePanel');
  const testCasesPanel = document.getElementById('testCasesPanel');
  const tabs = document.querySelectorAll('.tab-btn');

  if (tab === 'code') {
    codeWrapper.style.display = 'flex';
    consolePanel.classList.remove('show');
    testCasesPanel.classList.remove('show');
    tabs[0].classList.add('active');
    if (tabs[1]) tabs[1].classList.remove('active');
    if (tabs[2]) tabs[2].classList.remove('active');
  } else if (tab === 'console') {
    codeWrapper.style.display = 'none';
    consolePanel.classList.add('show');
    testCasesPanel.classList.remove('show');
    if (tabs[0]) tabs[0].classList.remove('active');
    tabs[1].classList.add('active');
    if (tabs[2]) tabs[2].classList.remove('active');
  } else if (tab === 'cases') {
    codeWrapper.style.display = 'none';
    consolePanel.classList.remove('show');
    testCasesPanel.classList.add('show');
    if (tabs[0]) tabs[0].classList.remove('active');
    if (tabs[1]) tabs[1].classList.remove('active');
    tabs[2].classList.add('active');
  }
}

// ============================================================
// RUN CODE
// ============================================================
function runCode() {
  const num = String(state.currentLevel);
  const lang = state.currentLanguage;
  const code = document.getElementById('codeEditor').value;

  switchTab('console');
  const consoleContent = document.getElementById('consoleContent');

  consoleContent.innerHTML = '<div class="console-line info"><span class="console-prompt">></span> 正在运行测试用例...</div>';

  setTimeout(() => {
    let output = '';
    output += '<div class="console-line info"><span class="console-prompt">></span> Language: ' + lang.toUpperCase() + '</div>';
    output += '<div class="console-line info"><span class="console-prompt">></span> Code length: ' + code.split('\n').filter(l => l.trim()).length + ' lines</div>';

    const details = PROBLEM_DETAILS[num];
    if (details && details.testCases && details.testCases.length > 0) {
      output += '<div style="margin-top:6px;"></div>';
      details.testCases.forEach((tc, i) => {
        output += '<div class="console-line info">测试用例 #' + (i + 1) + ':</div>';
        output += '<div class="console-line" style="color:#8899aa;">  输入: ' + tc.input + '</div>';
        output += '<div class="console-line" style="color:#8899aa;">  期望输出: ' + tc.expected + '</div>';
        output += '<div class="console-line" style="color:var(--amber);">  ⚠ 未验证（需要后端判题系统）</div>';
      });
      output += '<div style="margin-top:6px;"></div>';
      output += '<div class="console-line info"><span class="console-prompt">></span> 共 ' + details.testCases.length + ' 个测试用例，需判题系统验证。</div>';
    } else {
      output += '<div class="console-line info"><span class="console-prompt">></span> 此题目暂无预设测试用例。</div>';
      output += '<div class="console-line info"><span class="console-prompt">></span> 代码格式验证通过。准备发起攻击！</div>';
    }

    output += '<div style="margin-top:4px;"></div>';
    output += '<div class="console-line" style="color:var(--amber);"><span class="console-prompt">></span> 点击 ATTACK! 发起攻击挑战。</div>';

    consoleContent.innerHTML = output;
  }, 800);
}

// ============================================================
// ATTACK!
// ============================================================
function attack() {
  const num = String(state.currentLevel);

  let levelInfo = null;
  for (const [kid, levels] of Object.entries(LEVEL_DATA)) {
    const found = levels.find(l => l.number === parseInt(num));
    if (found) { levelInfo = found; break; }
  }
  const difficulty = levelInfo ? levelInfo.difficulty : 'easy';

  const btns = document.querySelectorAll('.pixel-btn');
  btns.forEach(b => b.disabled = true);

  // Show test cases in console
  switchTab('console');
  const consoleContent = document.getElementById('consoleContent');
  let tcOutput = '<div class="console-line info"><span class="console-prompt">></span> ⚔️ 发动攻击！正在运行测试用例...</div>';

  const details = PROBLEM_DETAILS[num];
  if (details && details.testCases && details.testCases.length > 0) {
    details.testCases.forEach((tc, i) => {
      tcOutput += '<div class="console-line info">测试用例 #' + (i + 1) + ':</div>';
      tcOutput += '<div class="console-line" style="color:#8899aa;">  输入: ' + tc.input + '</div>';
      tcOutput += '<div class="console-line" style="color:#8899aa;">  期望输出: ' + tc.expected + '</div>';
      tcOutput += '<div class="console-line" style="color:var(--amber);">  ⚠ 未验证（需要后端判题系统）</div>';
    });
  }
  consoleContent.innerHTML = tcOutput;

  const isVictory = Math.random() < 0.75;

  if (isVictory) {
    setTimeout(() => {
      const hpBar = document.getElementById('enemyHpBar');
      const hpText = document.getElementById('enemyHpText');
      hpBar.style.width = '0%';
      hpBar.style.background = '#ff4444';
      hpText.textContent = '0 / 100';

      const sprite = document.getElementById('enemySprite');
      setTimeout(() => sprite.classList.add('defeated'), 200);

      showToast('victory', '🎉 VICTORY!', '测试用例预览通过！(需实装判题系统验证)');

      // Mark as solved
      const wasNewSolve = !isProblemSolved(num);
      if (wasNewSolve) {
        state.solvedProblems.push(num);
      }

      // Adventure mode: advance stage if this was the current stage
      if (state.currentMode === 'adventure' && wasNewSolve) {
        const currentStage = ADVENTURE_STAGES.find(s => s.number === parseInt(num));
        if (currentStage && currentStage.stage === state.adventureStage) {
          state.adventureStage = Math.min(state.adventureStage + 1, ADVENTURE_STAGES.length);
        }
      }

      saveState();
      setTimeout(() => updateHUD(), 400);

      setTimeout(() => {
        btns.forEach(b => b.disabled = false);
        hpBar.style.width = '100%';
        hpBar.style.background = 'var(--hp-green)';
        hpText.textContent = '100 / 100';
        document.getElementById('enemySprite').classList.remove('defeated');
        document.getElementById('enemySprite').textContent = levelInfo ? levelInfo.enemy : '👾';

        // Flash unlock effect on next stage in adventure mode
        if (state.currentMode === 'adventure' && wasNewSolve) {
          const nextStageEl = document.getElementById('adventureStage' + state.adventureStage);
          if (nextStageEl) {
            nextStageEl.classList.add('unlocking');
            setTimeout(() => nextStageEl.classList.remove('unlocking'), 1500);
          }
        }
      }, 2000);

    }, 500);
  } else {
    setTimeout(() => {
      showToast('defeat', '💀 DEFEATED!', '再试一次吧，冒险者！');
      document.getElementById('enemyBar').style.animation = 'shake 0.5s ease';
      setTimeout(() => {
        document.getElementById('enemyBar').style.animation = '';
        btns.forEach(b => b.disabled = false);
      }, 500);
    }, 500);
  }
}

// ============================================================
// TOAST NOTIFICATIONS
// ============================================================
function showToast(type, title, detail) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = title + (detail ? '<div class="toast xp">' + detail + '</div>' : '');
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 2200);
}

// ============================================================
// TAVERN MODAL
// ============================================================
function openTavern() {
  const overlay = document.getElementById('tavernOverlay');
  const list = document.getElementById('tavernList');

  if (state.solvedProblems.length === 0) {
    list.innerHTML = '<div class="tavern-empty">🏮 你还没有击败任何敌人，冒险者。<br>快去王国中挑战吧！</div>';
  } else {
    list.innerHTML = state.solvedProblems.map(num => {
      let kingdomId = null;
      for (const [kid, levels] of Object.entries(LEVEL_DATA)) {
        if (levels.find(l => l.number === parseInt(num))) {
          kingdomId = kid;
          break;
        }
      }
      const kingdom = KINGDOMS.find(k => k.id === kingdomId);
      const level = kingdomId ? LEVEL_DATA[kingdomId].find(l => l.number === parseInt(num)) : null;

      return `
        <div class="tavern-item" onclick="enterBattle(${num}, '${kingdomId || 'array'}'); closeTavern();">
          <span class="enemy-icon">${level ? level.enemy : '👾'}</span>
          <span class="problem-id">#${num}</span>
          <span class="problem-name">${level ? level.title : 'Unknown'}</span>
          <span class="kingdom-tag">${kingdom ? kingdom.emoji + ' ' + kingdom.name : ''}</span>
        </div>
      `;
    }).join('');
  }

  overlay.classList.add('show');
}

function closeTavern() {
  document.getElementById('tavernOverlay').classList.remove('show');
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  loadState();

  // Initialize theme
  applyTheme(getCurrentTheme());

  const codeEditor = document.getElementById('codeEditor');
  codeEditor.addEventListener('input', updateLineNumbers);
  codeEditor.addEventListener('scroll', syncScroll);
  codeEditor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 4;
      updateLineNumbers();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      if (document.getElementById('screenBattle').classList.contains('active')) {
        attack();
      }
    }
    if (e.ctrlKey && e.key === 'r') {
      e.preventDefault();
      if (document.getElementById('screenBattle').classList.contains('active')) {
        runCode();
      }
    }
    if (e.key === 'Escape') {
      if (document.getElementById('tavernOverlay').classList.contains('show')) {
        closeTavern();
      }
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'R') {
      e.preventDefault();
      if (confirm('确定要重置所有进度吗？此操作不可撤销！')) {
        state.solvedProblems = [];
        state.adventureStage = 1;
        saveState();
        updateHUD();
        renderKingdomSelect();
        renderAdventurePath();
        renderPlaylistGrid();
        showToast('mode', '🗑️ 进度已重置', '');
      }
    }
  });

  // Close tavern on overlay click
  document.getElementById('tavernOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeTavern();
  });

  // Switch back to saved mode on load
  switchMode(state.currentMode);
});

// Expose for onclick handlers
window.enterKingdom = enterKingdom;
window.enterBattle = enterBattle;
window.enterPlaylist = enterPlaylist;
window.goToKingdomSelect = goToKingdomSelect;
window.goToTrials = goToTrials;
window.openTavern = openTavern;
window.closeTavern = closeTavern;
window.flee = flee;
window.runCode = runCode;
window.attack = attack;
window.onLanguageChange = onLanguageChange;
window.switchTab = switchTab;
window.switchMode = switchMode;
window.toggleSolution = toggleSolution;
window.switchSolutionLang = switchSolutionLang;
window.cycleTheme = cycleTheme;
</script>

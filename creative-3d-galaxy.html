<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Code Explorer - 3D Galaxy Coding Practice</title>
<style>
:root {
  --bg: #000010;
  --panel-bg: rgba(5,5,25,0.95);
  --text: #e0e0ff;
  --accent: #7b68ee;
  --easy: #4ade80;
  --medium: #fbbf24;
  --hard: #f87171;
  --glow-easy: rgba(74,222,128,0.6);
  --glow-medium: rgba(251,191,36,0.6);
  --glow-hard: rgba(248,113,113,0.6);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  overflow: hidden;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

canvas { display:block; position:fixed; top:0; left:0; z-index:1; }

/* Star cursor */
#cursor-glow {
  position: fixed; pointer-events: none; z-index: 10;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(123,104,238,0.4) 0%, transparent 70%);
  transform: translate(-50%,-50%);
  transition: opacity 0.3s;
  opacity: 0;
}

/* Floating label */
.planet-label {
  position: fixed; z-index: 5;
  pointer-events: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-align: center;
  transform: translate(-50%,-50%);
  text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.planet-label.visible { opacity: 1; }

/* Problem overlay */
#overlay {
  position: fixed; z-index: 100;
  bottom: 0; left: 0; right: 0;
  height: 55vh;
  background: var(--panel-bg);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top: 1px solid rgba(123,104,238,0.4);
  border-radius: 24px 24px 0 0;
  box-shadow: 0 -10px 60px rgba(123,104,238,0.3);
  transform: translateY(100%);
  transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#overlay.open { transform: translateY(0); }

#overlay-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}

#overlay-header {
  padding: 16px 28px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#overlay-header .left { display:flex; align-items:center; gap:12px; }
#overlay-number {
  font-size: 14px; color: var(--accent);
  font-weight: 700; letter-spacing: 0.1em;
  background: rgba(123,104,238,0.15);
  padding: 4px 12px; border-radius: 20px;
}
#overlay-title {
  font-size: 22px; color: #fff;
  font-weight: 700;
  text-shadow: 0 0 20px rgba(123,104,238,0.5);
}
#overlay-difficulty {
  font-size: 12px; font-weight: 700;
  padding: 4px 14px; border-radius: 20px;
  letter-spacing: 0.08em;
}
.difficulty-easy { background:rgba(74,222,128,0.2); color:var(--easy); }
.difficulty-medium { background:rgba(251,191,36,0.2); color:var(--medium); }
.difficulty-hard { background:rgba(248,113,113,0.2); color:var(--hard); }

#close-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  flex-shrink: 0;
}
#close-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
}

#overlay-body {
  flex: 1;
  padding: 0 28px 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#overlay-desc {
  color: #b0b0d0;
  font-size: 14px;
  line-height: 1.7;
  flex-shrink: 0;
}

#overlay-tags {
  display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
}
.tag {
  font-size: 11px; padding: 4px 12px;
  border-radius: 14px;
  background: rgba(123,104,238,0.12);
  color: #c4b5fd;
  border: 1px solid rgba(123,104,238,0.25);
}

/* Tab system */
#tab-bar {
  display: flex; gap: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.tab-btn {
  padding: 8px 18px;
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,0.4);
  background: none; border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.3s;
  letter-spacing: 0.03em;
}
.tab-btn:hover { color: rgba(255,255,255,0.7); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

#code-panel {
  flex: 1;
  min-height: 0;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
  position: relative;
}
#code-panel pre {
  margin: 0; padding: 20px;
  height: 100%;
  overflow: auto;
  font-family: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px; line-height: 1.7;
  color: #d4d4d8;
  display: none;
}
#code-panel pre.active { display: block; }

/* syntax highlighting */
.code .keyword { color:#c084fc; }
.code .string { color:#86efac; }
.code .comment { color:#6b7280; font-style:italic; }
.code .number { color:#fdba74; }
.code .func { color:#67e8f9; }
.code .type { color:#f0abfc; }
.code .builtin { color:#a5b4fc; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.25); }

/* HUD */
#hud {
  position:fixed; top:20px; left:28px; z-index:50;
  pointer-events: none;
}
#hud-title {
  font-size: 28px; font-weight: 900;
  letter-spacing: 0.05em;
  background: linear-gradient(135deg, #c4b5fd, #7b68ee, #4f46e5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
#hud-subtitle {
  font-size: 12px; color: rgba(255,255,255,0.4);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

#hint {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:50; pointer-events: none;
  font-size: 12px; color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  transition: opacity 1s;
}

/* Click ripple */
.ripple {
  position:fixed; pointer-events:none; z-index:50;
  border-radius:50%;
  border:1px solid rgba(123,104,238,0.5);
  animation: ripple-out 0.8s ease-out forwards;
}
@keyframes ripple-out {
  from { width:0; height:0; opacity:1; }
  to { width:200px; height:200px; opacity:0; margin-left:-100px; margin-top:-100px; }
}
</style>
</head>

    def __init__(self, k=0, v=0):
        self.k, self.v = k, v

class LRUCache:
    def __init__(self, cap):
        self.cap = cap
        self.cache = {}
        self.head = Node()
        self.tail = Node()
        self.head.next = self.tail
        self.tail.prev = self.head

    def _remove(self, node):

        node.next.prev = node.prev

    def _add(self, node):
        node.next = self.head.next
        node.prev = self.head
        self.head.next.prev = node
        self.head.next = node

    def get(self, key):
        if key not in self.cache: return -1
        node = self.cache[key]
        self._remove(node); self._add(node)
        return node.v

    def put(self, key, value):
        if key in self.cache:
            self._remove(self.cache[key])
        node = Node(key, value)
        self._add(node)
        self.cache[key] = node
        if len(self.cache) > self.cap:
            lru = self.tail.prev
            self._remove(lru)
            del self.cache[lru.k]`,

    class Node { int k, v; Node prev, next; Node(int k, int v) { this.k=k; this.v=v; } }

    Node head = new Node(0,0), tail = new Node(0,0);
    public LRUCache(int cap) {
        this.cap = cap;
        head.next = tail; tail.prev = head;
    }
    void remove(Node n) { n.prev.next = n.next; n.next.prev = n.prev; }
    void add(Node n) {
        n.next = head.next; n.prev = head;
        head.next.prev = n; head.next = n;
    }
    public int get(int key) {
        if (!map.containsKey(key)) return -1;
        Node n = map.get(key); remove(n); add(n); return n.v;

    struct Node { int k, v; Node *prev, *next; Node(int k=0,int v=0):k(k),v(v){} };
    int cap;
    unordered_map<int, Node*> m;
    Node *head, *tail;
    void remove(Node* n) { n->prev->next=n->next; n->next->prev=n->prev; }
    void add(Node* n) {
        n->next=head->next; n->prev=head;
        head->next->prev=n; head->next=n;
    }
public:
    LRUCache(int cap): cap(cap) {
        head=new Node(); tail=new Node();
        head->next=tail; tail->prev=head;

    int get(int key) {
        if(!m.count(key)) return -1;
        Node* n=m[key]; remove(n); add(n); return n->v;

    constructor(capacity) {
        this.cap = capacity;
        this.map = new Map();
    }
    get(key) {
        if (!this.map.has(key)) return -1;
        const v = this.map.get(key);
        this.map.delete(key);
        this.map.set(key, v);
        return v;
    }
    put(key, value) {
        if (this.map.has(key)) this.map.delete(key);
        this.map.set(key, value);
        if (this.map.size > this.cap)

    }

  if (intersects.length > 0) {
    const planetObj = intersects[0].object;
    const problemData = planetObj.userData.problem;
    zoomTarget = planetObj;
    zoomStartTime = performance.now();

    // Ripple effect
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = e.clientX + 'px';
    ripple.style.top = e.clientY + 'px';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 800);

    // Hide hint
    document.getElementById('hint').style.opacity = '0';
  }
});

// ====== STARFIELD ======
function createStarfield() {
  const count = 2000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    // Random position in a large sphere
    const radius = 30 + Math.random() * 70;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = radius * Math.cos(phi);

    // Colors: mostly white/blue with some colored stars
    const colorChoice = Math.random();
    if (colorChoice < 0.1) { colors[i*3]=1; colors[i*3+1]=0.85; colors[i*3+2]=0.6; }
    else if (colorChoice < 0.2) { colors[i*3]=0.6; colors[i*3+1]=0.7; colors[i*3+2]=1; }
    else if (colorChoice < 0.25) { colors[i*3]=0.8; colors[i*3+1]=0.5; colors[i*3+2]=1; }
    else { const b=0.8+Math.random()*0.2; colors[i*3]=b; colors[i*3+1]=b; colors[i*3+2]=b; }

    sizes[i] = Math.random() * 2.5 + 0.5;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 0.15,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.9
  });

  const stars = new THREE.Points(geo, mat);
  stars.name = 'starfield';
  scene.add(stars);
  return stars;
}

// ====== NEBULA ======
function createNebula() {
  const group = new THREE.Group();

  // Central nebula - layers of particles
  const colors = [
    new THREE.Color('#7b68ee'),
    new THREE.Color('#4f46e5'),
    new THREE.Color('#c084fc'),
    new THREE.Color('#6366f1'),
    new THREE.Color('#a78bfa')
  ];

  for (let layer = 0; layer < 3; layer++) {
    const count = 800;
    const positions = new Float32Array(count * 3);
    const layerColors = new Float32Array(count * 3);
    const color = colors[layer];

    const spread = (layer + 1) * 4;

    for (let i = 0; i < count; i++) {
      const r = Math.random() * spread;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(2 * Math.random() - 1);
      positions[i * 3] = r * Math.sin(p) * Math.cos(t);
      positions[i * 3 + 1] = r * Math.sin(p) * Math.sin(t) * 0.4;
      positions[i * 3 + 2] = r * Math.cos(p);

      const alpha = (1 - r / spread) * 0.5;
      layerColors[i * 3] = color.r * alpha;
      layerColors[i * 3 + 1] = color.g * alpha;
      layerColors[i * 3 + 2] = color.b * alpha;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(layerColors, 3));

    const mat = new THREE.PointsMaterial({
      size: 0.25 + layer * 0.1,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      transparent: true,
      opacity: 0.6
    });

    const points = new THREE.Points(geo, mat);
    points.userData = { rotSpeed: 0.02 + layer * 0.01, rotAxis: layer === 0 ? 'y' : layer === 1 ? 'x' : 'z' };
    group.add(points);
  }

  // Bright core
  const coreCount = 200;
  const corePositions = new Float32Array(coreCount * 3);
  const coreColors = new Float32Array(coreCount * 3);
  for (let i = 0; i < coreCount; i++) {
    const r = Math.random() * 2;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    corePositions[i*3] = r * Math.sin(p) * Math.cos(t);
    corePositions[i*3+1] = r * Math.sin(p) * Math.sin(t);
    corePositions[i*3+2] = r * Math.cos(p);
    coreColors[i*3] = 1; coreColors[i*3+1] = 0.85; coreColors[i*3+2] = 1;
  }
  const coreGeo = new THREE.BufferGeometry();
  coreGeo.setAttribute('position', new THREE.BufferAttribute(corePositions, 3));
  coreGeo.setAttribute('color', new THREE.BufferAttribute(coreColors, 3));
  const coreMat = new THREE.PointsMaterial({
    size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0.9
  });
  const core = new THREE.Points(coreGeo, coreMat);
  group.add(core);

  group.name = 'nebula';
  scene.add(group);
  return group;
}

// ====== PLANET TEXTURE ======
function createPlanetTexture(baseColor, hasAtmosphere) {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // Base
  const grad = ctx.createRadialGradient(size/2, size/2, size*0.1, size/2, size/2, size/2);
  grad.addColorStop(0, baseColor);
  grad.addColorStop(0.5, baseColor);
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // Craters / surface detail
  if (hasAtmosphere) {
    for (let i = 0; i < 40; i++) {
      const x = Math.random() * size;
      const y = Math.random() * size;
      const r = Math.random() * 8 + 2;
      const alpha = Math.random() * 0.3;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
    for (let i = 0; i < 15; i++) {
      const x = Math.random() * size;
      const y = Math.random() * size;
      const r = Math.random() * 15 + 5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.4})`;
      ctx.fill();
    }
  }

  return new THREE.CanvasTexture(c);
}

// ====== GLOW SPRITE ======
function createGlowSprite(colorStr) {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, colorStr);
  grad.addColorStop(0.3, colorStr);
  grad.addColorStop(0.6, 'rgba(0,0,0,0.1)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  const tex = new THREE.CanvasTexture(c);
  const spriteMat = new THREE.SpriteMaterial({
    map: tex,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.6
  });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(3, 3, 1);
  return sprite;
}

// ====== HOLOGRAPHIC STATS ======
function createHoloText(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 512, 64);
  ctx.font = 'bold 28px "Segoe UI","PingFang SC",sans-serif';
  ctx.fillStyle = '#7b68ee';
  ctx.shadowColor = '#7b68ee';
  ctx.shadowBlur = 15;
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 40);
  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({
    map: tex,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.7
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(8, 1, 1);
  return sprite;
}

// Planet positions in a spiral-like pattern
function getPlanetPosition(index, total) {
  const goldenRatio = (1 + Math.sqrt(5)) / 2;
  const angleIncrement = Math.PI * 2 / goldenRatio;
  const t = index / total;

  // Spiral distribution
  const radius = 8 + t * 16;
  const angle = index * angleIncrement;
  const height = (Math.random() - 0.5) * 12;

  return new THREE.Vector3(
    Math.cos(angle) * radius + (Math.random() - 0.5) * 4,
    height,
    Math.sin(angle) * radius + (Math.random() - 0.5) * 4
  );
}

problems.forEach((prob, i) => {
  const pos = getPlanetPosition(i, problems.length);
  const color = difficultyColors[prob.difficulty];
  const glow = difficultyGlow[prob.difficulty];
  const size = difficultySizes[prob.difficulty];

  // Planet mesh
  const tex = createPlanetTexture(color, true);
  const geo = new THREE.SphereGeometry(size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    map: tex,
    roughness: 0.7,
    metalness: 0.1,
    emissive: new THREE.Color(color),
    emissiveIntensity: 0.3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.userData = { problem: prob, baseEmissive: 0.3, size };
  mesh.castShadow = true;

  // Glow sprite
  const glowSprite = createGlowSprite(glow);
  mesh.add(glowSprite);
  planetGlowSprites.push(glowSprite);

  // Ring for medium/hard
  if (prob.difficulty !== 'easy') {
    const ringGeo = new THREE.TorusGeometry(size * 1.4, 0.04, 16, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(color),
      transparent: true,
      opacity: 0.4,
      depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2 + Math.random() * 0.5;
    ring.rotation.y = Math.random() * Math.PI;
    ring.userData = { rotSpeed: 0.3 + Math.random() * 0.5 };
    mesh.add(ring);
  }

  scene.add(mesh);
  planetMeshes.push(mesh);

  // Orbit ring (subtle)
  const orbitRingGeo = new THREE.TorusGeometry(pos.length() * 0.95, 0.02, 8, 128);
  const orbitRingMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color),

  });

});

// ====== CONSTELLATION LINES ======
function createConstellationLines() {
  const tagGroups = {};
  problems.forEach(p => {
    p.tags.forEach(tag => {
      if (!tagGroups[tag]) tagGroups[tag] = [];
      tagGroups[tag].push(p.id - 1);
    });
  });

  const group = new THREE.Group();

  Object.values(tagGroups).forEach(indices => {
    if (indices.length < 2) return;
    const color = new THREE.Color().setHSL(Math.random() * 360 / 360, 0.7, 0.5);

    for (let i = 0; i < indices.length; i++) {
      for (let j = i + 1; j < indices.length; j++) {
        const p1 = planetMeshes[indices[i]].position;
        const p2 = planetMeshes[indices[j]].position;
        const dist = p1.distanceTo(p2);
        if (dist > 20) continue;

        const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        const points = [p1, mid, p2];
        const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
        const curvePoints = curve.getPoints(32);
        const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
        const lineMat = new THREE.LineBasicMaterial({
          color,
          transparent: true,
          opacity: 0.15,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        group.add(new THREE.Line(lineGeo, lineMat));
      }
    }
  });

  group.name = 'constellations';
  scene.add(group);
  return group;
}

let hoveredPlanet = null;

function updateHover(planet) {
  // Reset previous
  if (hoveredPlanet && hoveredPlanet !== planet) {
    const prev = hoveredPlanet.userData.problem;
    hoveredPlanet.material.emissiveIntensity = hoveredPlanet.userData.baseEmissive;
    if (hoveredPlanet.userData.glowSprite) {
      hoveredPlanet.userData.glowSprite.material.opacity = 0.6;
    }
    const idx = prev.id - 1;
    labelEls[idx].classList.remove('visible');
  }

  hoveredPlanet = planet;

  if (planet) {
    document.body.style.cursor = 'pointer';
    const prob = planet.userData.problem;
    planet.material.emissiveIntensity = 0.8;
    if (planet.userData.glowSprite) {
      planet.userData.glowSprite.material.opacity = 1;
    }
    const idx = prob.id - 1;
    labelEls[idx].classList.add('visible');
  } else {
    document.body.style.cursor = 'default';
  }
}

// ====== ANIMATION LOOP ======
const clock = new THREE.Clock();
const targetCamPos = new THREE.Vector3();
const targetLookAt = new THREE.Vector3();

function animate(time) {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const elapsed = time * 0.001;

  // Auto rotate
  if (orbit.autoRotate && !zoomTarget) {
    orbit.targetTheta += orbit.autoRotateSpeed * dt;
  }

  // Zoom to planet
  if (zoomTarget) {
    const targetWorldPos = new THREE.Vector3();
    zoomTarget.getWorldPosition(targetWorldPos);
    const dir = targetWorldPos.clone().normalize();
    targetCamPos.copy(targetWorldPos.clone().add(dir.multiplyScalar(5)));
    targetLookAt.copy(targetWorldPos);

    // Lerp camera
    const lerpFactor = 1 - Math.exp(-2.5 * dt);
    camera.position.lerp(targetCamPos, lerpFactor);
    camera.lookAt(targetLookAt);

    // Check if close enough
    if (camera.position.distanceTo(targetCamPos) < 0.3 && !overlay.classList.contains('open')) {
      const prob = zoomTarget.userData.problem;
      openOverlay(prob);

      // Reset orbit state
      orbit.theta = Math.atan2(camera.position.x, camera.position.z);
      const horizDist = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
      orbit.phi = Math.atan2(horizDist, camera.position.y);
      orbit.radius = camera.position.length();
      orbit.targetTheta = orbit.theta;
      orbit.targetPhi = orbit.phi;
      orbit.targetRadius = orbit.radius;
    }
  } else {
    // Normal orbit update
    updateOrbitTargets();
    updateCameraFromOrbit();
  }

  // Animate nebula
  nebula.children.forEach(child => {
    if (child.isPoints && child.userData.rotSpeed) {
      const axis = child.userData.rotAxis;
      if (axis === 'y') child.rotation.y += child.userData.rotSpeed * dt;
      else if (axis === 'x') child.rotation.x += child.userData.rotSpeed * dt;
      else child.rotation.z += child.userData.rotSpeed * dt;
    }
  });

  // Animate planet rings
  planetMeshes.forEach(mesh => {
    mesh.rotation.y += dt * 0.15;
    mesh.children.forEach(child => {
      if (child.isMesh && child.geometry.type === 'TorusGeometry' && child.userData.rotSpeed) {
        child.rotation.z += child.userData.rotSpeed * dt;
      }
    });
  });

  // Twinkle starfield - subtle
  if (Math.random() < 0.02) {
    starfield.material.opacity = 0.85 + Math.sin(elapsed * 3) * 0.05;
  }

  // Animate holographic stats
  holoStats.children.forEach((sprite, i) => {
    sprite.position.y += Math.sin(elapsed * 0.8 + i * 2) * dt * 0.3;
    sprite.material.opacity = 0.5 + Math.sin(elapsed * 1.2 + i) * 0.2;
  });

  // Update labels
  planetMeshes.forEach((mesh, i) => {
    if (mesh.userData.problem) {
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);
      const screenPos = worldPos.clone().project(camera);

      if (screenPos.z > 1) {
        labelEls[i].style.display = 'none';
        return;
      }
      labelEls[i].style.display = '';
      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight - 20;
      labelEls[i].style.left = x + 'px';
      labelEls[i].style.top = y + 'px';

      // Fade labels based on distance
      const dist = camera.position.distanceTo(worldPos);
      labelEls[i].style.opacity = Math.max(0, 1 - (dist - 5) / 30);
    }
  });

  // Animate point light to pulse
  pointLight.intensity = 80 + Math.sin(elapsed * 0.5) * 10;

  renderer.render(scene, camera);
}

// ====== RESIZE ======
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ====== START ======
requestAnimationFrame(animate);
